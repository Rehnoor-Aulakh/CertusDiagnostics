spring.application.name=Certus-Backend
# Load a local, Git-ignored .env file when present. System environment variables
# take precedence, which is what production hosting should use.

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIME_ZONE:Asia/Kolkata}
server.port=${SERVER_PORT:8080}
 
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
 
app.jwt.secret=${APP_JWT_SECRET}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.superadmin.email=${SUPER_ADMIN_EMAIL:${super_admin_email:}}

# Disable the database seeder by default to prevent erasing data
app.seeder.enabled=false
app.upload.directory=${UPLOAD_DIRECTORY:../uploads/reports}

# Allow large PDF report uploads (default is 1MB which is too small)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
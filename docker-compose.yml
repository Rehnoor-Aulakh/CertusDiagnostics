services:
  client:
    env_file:
      - .env
    build:
      context: ./Certus-Client
    container_name: certus-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # Volumes removed for production to use built image
    # volumes:
    #   - ./Certus-Client:/app
    #   - /app/node_modules
  admin:
    env_file:
      - .env
    build:
      context: ./Certus-Admin
    container_name: certus-admin
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - backend
    # Volumes removed for production to use built image
    # volumes:
    #   - ./Certus-Admin:/app
    #   - /app/node_modules
  backend:
    env_file:
      - .env
    build:
      context: ./Certus-Backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-certus}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_DIRECTORY: /app/uploads/reports
    container_name: certus-backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
  postgres:
    image: postgres:17
    container_name: certus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-certus}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB:-certus}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

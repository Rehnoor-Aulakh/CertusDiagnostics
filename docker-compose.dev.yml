services:
  client:
    build:
      target: builder
    command: ["npm", "run", "dev", "--", "--host"]
    ports:
      - "5173:5173"
    volumes:
      - ./Certus-Client:/app
      - /app/node_modules

  admin:
    build:
      target: builder
    command: ["npm", "run", "dev", "--", "--host"]
    ports:
      - "5174:5174"
    volumes:
      - ./Certus-Admin:/app
      - /app/node_modules

  backend:
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5433:5432"
